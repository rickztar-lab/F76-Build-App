name: build-check

# Verifica en cada push/PR que index.html esté regenerado desde la plantilla
# + los datos (que nadie lo haya editado a mano y quedado desincronizado) y
# que el build pase sus validaciones. No corre los tests de navegador
# (requieren Playwright/Chromium); esos se corren localmente con
# bash tests/run_all.sh.

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build-is-in-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Regenerar index.html y validar
        run: python3 build.py
      - name: Falla si index.html quedó desincronizado del template/datos
        run: |
          if ! git diff --quiet index.html; then
            echo "::error::index.html no está sincronizado. Corré 'python3 build.py' y commiteá el resultado."
            git diff --stat index.html
            exit 1
          fi
          echo "index.html está en sincronía con src/ + data_*.json"
